<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="nexusGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4f46e5" />
            <stop offset="100%" stop-color="#7c3aed" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="15" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    <!-- Fundo Sombrio -->
    <rect width="512" height="512" rx="120" fill="#0f172a" />
    
    <!-- Círculo de Fundo -->
    <circle cx="256" cy="256" r="200" fill="url(#nexusGradient)" opacity="0.15" />
    <circle cx="256" cy="256" r="160" fill="none" stroke="url(#nexusGradient)" stroke-width="8" opacity="0.4" />
    
    <!-- Raio Elétrico (Lightning Bolt) -->
    <path d="M220 120 L300 240 L250 260 L280 400 L180 270 L240 250 Z" 
          fill="url(#nexusGradient)" 
          filter="url(#glow)" 
          transform="translate(10, 0)" />
          
    <path d="M220 120 L300 240 L250 260 L280 400 L180 270 L240 250 Z" 
          fill="#ffffff" 
          opacity="0.8"
          transform="translate(10, 0)" />
</svg>
